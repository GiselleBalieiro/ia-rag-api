version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Dashboard do Traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

  # --- CLIENTES ---
  # Duplique este bloco para cada cliente, mudando:
  #   - nome do serviço (client-1, client-2, etc.)
  #   - container_name
  #   - CLIENT_ID
  #   - AGENT_IDS (IDs dos agentes que esse container gerencia)
  #   - regra do Traefik (PathPrefix ou Host)

  client-1:
    build: .
    container_name: client-1
    restart: unless-stopped
    environment:
      PORT: "3000"
      CLIENT_ID: "1"
      AGENT_IDS: "" # Ex: "1,2,3" — vazio = todos os agentes com status=1
      MONGO_URL: ${MONGO_URL}
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client1.rule=PathPrefix(`/`)"
      - "traefik.http.services.client1.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 512M

  # Exemplo de segundo cliente (descomente quando necessário):
  # client-2:
